name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Metadata Generator Script
        run: |
          cat << 'EOF' > generate.py
          import csv
          import json
          import os

          csv_file = 'traits.csv'
          output_dir = 'metadata'
          base_image_url = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/'

          if not os.path.exists(csv_file):
              print("Error: traits.csv not found!")
              exit(1)

          with open(csv_file, mode='r', encoding='utf-8-sig') as file:
              reader = csv.DictReader(file)
              reader.fieldnames = [name.strip() if name else '' for name in reader.fieldnames]
              
              for row in reader:
                  # Get Token ID and check if it exists
                  raw_id = row.get('Token ID') or row.get('TokenID') or row.get('id')
                  
                  # Skip completely empty rows or rows without a Token ID
                  if raw_id is None or str(raw_id).strip() == '':
                      continue
                  
                  token_id = str(raw_id).strip()
                  
                  # Try parsing to integer safely to avoid any type error
                  try:
                      edition_number = int(token_id)
                  except ValueError:
                      continue
                  
                  # Standard OpenSea Metadata Structure
                  metadata = {
                      "name": f"Ice Punk #{token_id}",
                      "description": "IcePunks NFT Collection generated from official traits.",
                      "image": f"{base_image_url}{token_id}.png",
                      "edition": edition_number,
                      "attributes": []
                  }
                  
                  # Loop through all columns to add traits, filtering out IDs and the 'Attributes' summary column
                  for key, value in row.items():
                      cleaned_key = key.strip() if key else ''
                      cleaned_value = value.strip() if value else ''
                      
                      if cleaned_key.lower() in ['token id', 'tokenid', 'id', 'attributes']:
                          continue
                          
                      if cleaned_value and cleaned_value.lower() != 'nan' and cleaned_value != '':
                          metadata["attributes"].append({
                              "trait_type": cleaned_key,
                              "value": cleaned_value
                          })
                  
                  # Save as extensionless Token ID file
                  file_path = os.path.join(output_dir, token_id)
                  with open(file_path, 'w', encoding='utf-8') as json_file:
                      json.dump(metadata, json_file, indent=4)

          print("Metadata generation completed successfully!")
          EOF
          python generate.py
          rm generate.py

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Fix token id type error and successfully generate metadata"
            git pull origin main --rebase
            git push origin main
          else
            echo "No new metadata changes detected"
          fi
