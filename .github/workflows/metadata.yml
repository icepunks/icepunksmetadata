name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Super Robust Metadata Generator
        run: |
          cat << 'EOF' > generate.js
          const fs = require('fs');
          const path = require('path');

          // Directly using your uploaded filename to avoid any missing file error
          const csvPath = 'IcePunkstraits.csv';
          const outputDir = 'metadata';
          const baseImageUrl = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/';

          if (!fs.existsSync(csvPath)) {
              console.error(`Error: The file "${csvPath}" was not found in the root directory! Please make sure it is uploaded.`);
              process.exit(1);
          }

          // Clean BOM and standardize all carriage returns cleanly
          const content = fs.readFileSync(csvPath, 'utf8')
                            .replace(/^\uFEFF/, '')
                            .replace(/\r\n/g, '\n')
                            .replace(/\r/g, '\n');
                            
          const lines = content.split('\n').map(line => line.trim()).filter(line => line.length > 0);

          if (lines.length < 2) {
              console.error("CSV file is empty or missing data rows!");
              process.exit(1);
          }

          // Advanced CSV splitter that strips wrapping quotes and spaces safely
          function parseCsvLine(line) {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') {
                      inQuotes = !inQuotes;
                  } else if (char === ',' && !inQuotes) {
                      result.push(current.trim());
                      current = '';
                  } else {
                      current += char;
                  }
              }
              result.push(current.trim());
              return result;
          }

          // Static hardcoded headers to completely bypass sheet first row text corruption
          const headers = [
              "Token ID", "Type", "Gender", "Skin Tone", "Attributes",
              "Accessory 1", "Accessory 2", "Accessory 3", "Accessory 4",
              "Accessory 5", "Accessory 6", "Accessory 7"
          ];

          let count = 0;

          // Start strictly from loop 1 (Row 2 on your sheet)
          for (let i = 1; i < lines.length; i++) {
              try {
                  const columns = parseCsvLine(lines[i]);
                  if (columns.length === 0 || !columns[0]) continue;

                  // Extract and isolate only digits for Token ID
                  const tokenId = columns[0].replace(/[^0-9]/g, ''); 
                  if (tokenId === '') continue;

                  const metadata = {
                      name: `Ice Punk #${tokenId}`,
                      description: "IcePunks NFT Collection generated from official traits.",
                      image: `${baseImageUrl}${tokenId}.png`,
                      edition: parseInt(tokenId, 10),
                      attributes: []
                  };

                  // Map column values safely with zero reliance on CSV first row headers
                  for (let colIdx = 1; colIdx < headers.length; colIdx++) {
                      const headerName = headers[colIdx];
                      const val = columns[colIdx];

                      if (val && val.trim() !== '' && val.toLowerCase() !== 'nan' && headerName.toLowerCase() !== 'attributes') {
                          metadata.attributes.push({
                              trait_type: headerName,
                              value: val.replace(/^"|"$/g, '').trim()
                          });
                      }
                  }

                  const filePath = path.join(outputDir, tokenId);
                  fs.writeFileSync(filePath, JSON.stringify(metadata, null, 4), 'utf-8');
                  count++;
              } catch (err) {
                  // Fallback safe bypass
                  continue;
              }
          }

          console.log(`Successfully generated ${count} metadata files!`);
          EOF
          node generate.js
          rm generate.js

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Successfully generated metadata files using official filename"
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes detected"
          fi
