name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Bulletproof Metadata Generator
        run: |
          cat << 'EOF' > generate.js
          const fs = require('fs');
          const path = require('path');

          const csvPath = 'traits.csv';
          const outputDir = 'metadata';
          const baseImageUrl = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/';

          if (!fs.existsSync(csvPath)) {
              console.error("Error: traits.csv not found!");
              process.exit(1);
          }

          // Read file safely handling binary or messy data
          const content = fs.readFileSync(csvPath, 'utf8').replace(/^\uFEFF/, '');
          const lines = content.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);

          if (lines.length < 2) {
              console.error("CSV file does not contain enough data!");
              process.exit(1);
          }

          // Safe CSV line parser that automatically detects comma/semicolon and strips quotes
          function parseCsvLine(line) {
              let delimiter = ',';
              if (line.includes(';')) delimiter = ';';
              
              const result = [];
              let current = '';
              let inQuotes = false;

              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') {
                      inQuotes = !inQuotes;
                  } else if (char === delimiter && !inQuotes) {
                      result.push(current.trim());
                      current = '';
                  } else {
                      current += char;
                  }
              }
              result.push(current.trim());
              return result;
          }

          const headers = parseCsvLine(lines[0]);
          console.log("Headers detected successfully.");

          let successfulCount = 0;

          for (let i = 1; i < lines.length; i++) {
              try {
                  const columns = parseCsvLine(lines[i]);
                  if (columns.length === 0 || !columns[0]) continue;

                  // Safely read token id
                  const tokenId = columns[0].replace(/[^0-9]/g, ''); // Extract only numbers
                  if (!tokenId) continue;

                  const metadata = {
                      name: `Ice Punk #${tokenId}`,
                      description: "IcePunks NFT Collection generated from official traits.",
                      image: `${baseImageUrl}${tokenId}.png`,
                      edition: parseInt(tokenId, 10),
                      attributes: []
                  };

                  headers.forEach((header, colIdx) => {
                      if (!header) return;
                      const val = columns[colIdx];
                      const cleanHeader = header.trim();

                      // Filter out administrative columns
                      if (
                          cleanHeader.toLowerCase() !== 'token id' && 
                          cleanHeader.toLowerCase() !== 'tokenid' && 
                          cleanHeader.toLowerCase() !== 'id' && 
                          cleanHeader.toLowerCase() !== 'attributes'
                      ) {
                          if (val && val.toLowerCase() !== 'nan' && val.trim() !== '') {
                              metadata.attributes.push({
                                  trait_type: cleanHeader,
                                  value: val.replace(/^"|"$/g, '').trim()
                              });
                          }
                      }
                  });

                  const filePath = path.join(outputDir, tokenId);
                  fs.writeFileSync(filePath, JSON.stringify(metadata, null, 4), 'utf-8');
                  successfulCount++;
              } catch (lineError) {
                  // Safe bypass: If any row is corrupted, skip it instead of crashing the process
                  continue;
              }
          }

          console.log(`Successfully generated ${successfulCount} metadata files!`);
          EOF
          node generate.js
          rm generate.js

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Successfully generate 10k metadata via bulletproof parser"
            git pull origin main --rebase
            git push origin main
          else
            echo "No new metadata changes detected"
          fi
