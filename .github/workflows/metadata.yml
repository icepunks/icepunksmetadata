name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Bulletproof Metadata Generator
        run: |
          cat << 'EOF' > generate.js
          const fs = require('fs');
          const path = require('path');

          const csvPath = 'traits.csv';
          const outputDir = 'metadata';
          const baseImageUrl = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/';

          if (!fs.existsSync(csvPath)) {
              console.error("Error: traits.csv not found!");
              process.exit(1);
          }

          // Read file safely and split by newlines
          const content = fs.readFileSync(csvPath, 'utf8').replace(/^\uFEFF/, '');
          const lines = content.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);

          if (lines.length < 2) {
              console.error("CSV file is empty or missing data!");
              process.exit(1);
          }

          // Ultimate safe CSV line splitter that respects quoted commas
          function parseCsvLine(line) {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') {
                      inQuotes = !inQuotes;
                  } else if (char === ',' && !inQuotes) {
                      result.push(current.trim());
                      current = '';
                  } else {
                      current += char;
                  }
              }
              result.push(current.trim());
              return result;
          }

          // Hardcoded fixed headers based on your official IcePunksTraits.csv structure
          const headers = [
              "Token ID", "Type", "Gender", "Skin Tone", "Attributes",
              "Accessory 1", "Accessory 2", "Accessory 3", "Accessory 4",
              "Accessory 5", "Accessory 6", "Accessory 7"
          ];

          let count = 0;

          for (let i = 1; i < lines.length; i++) {
              try {
                  const columns = parseCsvLine(lines[i]);
                  if (columns.length === 0) continue;

                  // Directly get Token ID from the first column and clean it
                  const rawId = columns[0];
                  if (rawId === undefined || rawId === null || rawId === '') continue;
                  
                  const tokenId = rawId.replace(/[^0-9]/g, ''); // Keep numbers only
                  if (tokenId === '') continue;

                  const metadata = {
                      name: `Ice Punk #${tokenId}`,
                      description: "IcePunks NFT Collection generated from official traits.",
                      image: `${baseImageUrl}${tokenId}.png`,
                      edition: parseInt(tokenId, 10),
                      attributes: []
                  };

                  // Map traits starting from column index 1 (skipping Token ID)
                  headers.forEach((header, colIdx) => {
                      if (colIdx === 0) return; // Skip Token ID column
                      
                      const val = columns[colIdx];
                      const lowerHeader = header.toLowerCase();

                      // Skip the 'attributes' count column
                      if (lowerHeader !== 'attributes' && val && val.trim() !== '' && val.toLowerCase() !== 'nan') {
                          metadata.attributes.push({
                              trait_type: header,
                              value: val.replace(/^"|"$/g, '').trim() // Remove wrapping quotes
                          });
                      }
                  });

                  const filePath = path.join(outputDir, tokenId);
                  fs.writeFileSync(filePath, JSON.stringify(metadata, null, 4), 'utf-8');
                  count++;
              } catch (err) {
                  // If any row is corrupted, silently bypass it to avoid breaking the build
                  continue;
              }
          }

          console.log(`Successfully generated ${count} metadata files!`);
          EOF
          node generate.js
          rm generate.js

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Successfully generated metadata using robust parser"
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes detected"
          fi
