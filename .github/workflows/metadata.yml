name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Bulletproof Node Generator
        run: |
          cat << 'EOF' > generate.js
          const fs = require('fs');
          const path = require('path');

          const csvPath = 'traits.csv';
          const outputDir = 'metadata';
          const baseImageUrl = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/';

          if (!fs.existsSync(csvPath)) {
              console.error("Error: traits.csv not found!");
              process.exit(1);
          }

          const content = fs.readFileSync(csvPath, 'utf-8');
          // Remove BOM if exists and split into lines
          const lines = content.replace(/^\uFEFF/, '').split(/\r?\n/);
          
          if (lines.length === 0) {
              console.error("CSV file is empty!");
              process.exit(1);
          }

          // Parse Headers and clean spaces
          const headers = lines[0].split(',').map(h => h.trim());
          const tokenIdIndex = headers.findIndex(h => h.toLowerCase() === 'token id' || h.toLowerCase() === 'tokenid');

          if (tokenIdIndex === -1) {
              console.error("Error: 'Token ID' column not found in headers!");
              process.exit(1);
          }

          console.log("Starting metadata generation...");

          // Loop through rows (skip header)
          for (let i = 1; i < lines.length; i++) {
              const line = lines[i].trim();
              if (!line) continue; // Skip empty rows Safely

              // Split columns by comma (handle basic parsing)
              const columns = line.split(',').map(c => c.trim());
              const tokenId = columns[tokenIdIndex];

              if (!tokenId && tokenId !== '0') continue;

              const metadata = {
                  name: `Ice Punk #${tokenId}`,
                  description: "IcePunks NFT Collection generated from official traits.",
                  image: `${baseImageUrl}${tokenId}.png`,
                  edition: parseInt(tokenId, 10),
                  attributes: []
              };

              // Map traits dynamically
              headers.forEach((header, colIdx) => {
                  const val = columns[colIdx];
                  const lowerHeader = header.toLowerCase();

                  if (lowerHeader !== 'token id' && lowerHeader !== 'tokenid' && lowerHeader !== 'id' && lowerHeader !== 'attributes') {
                      if (val && val.toLowerCase() !== 'nan' && val !== '') {
                          metadata.attributes.push({
                              trait_type: header,
                              value: val
                          });
                      }
                  }
              });

              // Save file as extensionless Token ID
              const filePath = path.join(outputDir, tokenId);
              fs.writeFileSync(filePath, JSON.stringify(metadata, null, 4), 'utf-8');
          }

          console.log("Metadata generation completed successfully!");
          EOF
          node generate.js
          rm generate.js

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Successfully generate 10k metadata via Nodejs"
            git pull origin main --rebase
            git push origin main
          else
            echo "No new metadata changes detected"
          fi
