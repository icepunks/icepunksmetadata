name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Ultimate CSV Parser
        run: |
          cat << 'EOF' > generate.js
          const fs = require('fs');
          const path = require('path');

          const csvPath = 'traits.csv';
          const outputDir = 'metadata';
          const baseImageUrl = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/';

          if (!fs.existsSync(csvPath)) {
              console.error("Error: traits.csv not found!");
              process.exit(1);
          }

          const content = fs.readFileSync(csvPath, 'utf-8');
          const lines = content.replace(/^\uFEFF/, '').split(/\r?\n/);
          
          if (lines.length === 0 || !lines[0].trim()) {
              console.error("CSV file is empty!");
              process.exit(1);
          }

          // Smart delimiter detection (comma, semicolon, or tab)
          const firstLine = lines[0];
          let delimiter = ',';
          if (firstLine.includes(';')) delimiter = ';';
          else if (firstLine.includes('\t')) delimiter = '\t';

          // Helper function to split CSV line safely handling quotes
          function splitCsvLine(line, delim) {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') {
                      inQuotes = !inQuotes;
                  } else if (char === delim && !inQuotes) {
                      result.push(current.trim());
                      current = '';
                  } else {
                      current += char;
                  }
              }
              result.push(current.trim());
              return result;
          }

          // Parse Headers safely
          const headers = splitCsvLine(lines[0], delimiter);
          const tokenIdIndex = headers.findIndex(h => h && (h.toLowerCase() === 'token id' || h.toLowerCase() === 'tokenid' || h.toLowerCase() === 'id'));

          if (tokenIdIndex === -1) {
              console.error("Error: 'Token ID' column could not be auto-detected in headers!");
              process.exit(1);
          }

          console.log(`Detected Delimiter: "${delimiter}". Starting metadata generation...`);

          for (let i = 1; i < lines.length; i++) {
              const line = lines[i].trim();
              if (!line) continue;

              const columns = splitCsvLine(line, delimiter);
              const tokenId = columns[tokenIdIndex];

              if (tokenId === undefined || tokenId === '') continue;

              const metadata = {
                  name: `Ice Punk #${tokenId}`,
                  description: "IcePunks NFT Collection generated from official traits.",
                  image: `${baseImageUrl}${tokenId}.png`,
                  edition: parseInt(tokenId, 10),
                  attributes: []
              };

              headers.forEach((header, colIdx) => {
                  if (!header) return;
                  const val = columns[colIdx];
                  const lowerHeader = header.toLowerCase();

                  if (lowerHeader !== 'token id' && lowerHeader !== 'tokenid' && lowerHeader !== 'id' && lowerHeader !== 'attributes') {
                      if (val && val.toLowerCase() !== 'nan' && val !== '') {
                          metadata.attributes.push({
                              trait_type: header,
                              value: val.replace(/^"|"$/g, '').trim() // Remove extra surrounding quotes if any
                          });
                      }
                  }
              });

              const filePath = path.join(outputDir, tokenId);
              fs.writeFileSync(filePath, JSON.stringify(metadata, null, 4), 'utf-8');
          }

          console.log("Metadata generation completed successfully!");
          EOF
          node generate.js
          rm generate.js

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Successfully generate 10k metadata via ultimate node parser"
            git pull origin main --rebase
            git push origin main
          else
            echo "No new metadata changes detected"
          fi
