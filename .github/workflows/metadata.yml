name: Generate NFT Metadata JSON

on:
  workflow_dispatch:

jobs:
  generate-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Metadata Directory
        run: mkdir -p metadata

      - name: Run Bulletproof Metadata Generator
        run: |
          cat << 'EOF' > generate.js
          const fs = require('fs');
          const path = require('path');

          const csvPath = 'traits.csv';
          const outputDir = 'metadata';
          const baseImageUrl = 'https://raw.githubusercontent.com/icepunks/icepunksimage/main/images/';

          if (!fs.existsSync(csvPath)) {
              console.error("Error: traits.csv not found!");
              process.exit(1);
          }

          // Read file safely and split by lines
          const content = fs.readFileSync(csvPath, 'utf8').replace(/^\uFEFF/, '');
          const lines = content.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);

          if (lines.length < 2) {
              console.error("CSV file is empty or missing data!");
              process.exit(1);
          }

          // Safe CSV line splitter that handles quotes and delimiters
          function parseCsvLine(line) {
              const result = [];
              let current = '';
              let inQuotes = false;
              for (let i = 0; i < line.length; i++) {
                  const char = line[i];
                  if (char === '"') {
                      inQuotes = !inQuotes;
                  } else if (char === ',' && !inQuotes) {
                      result.push(current.trim());
                      current = '';
                  } else {
                      current += char;
                  }
              }
              result.push(current.trim());
              return result;
          }

          // Fixed headers matching your IcePunksTraits.csv perfectly
          const headers = [
              "Token ID", "Type", "Gender", "Skin Tone", "Attributes",
              "Accessory 1", "Accessory 2", "Accessory 3", "Accessory 4",
              "Accessory 5", "Accessory 6", "Accessory 7"
          ];

          let count = 0;

          // Start loop from index 1 (skipping header)
          for (let i = 1; i < lines.length; i++) {
              try {
                  const columns = parseCsvLine(lines[i]);
                  if (columns.length === 0 || !columns[0]) continue;

                  // Directly extract Token ID from the first column and clean any non-numeric symbols
                  const tokenId = columns[0].replace(/[^0-9]/g, ''); 
                  if (tokenId === '') continue;

                  const metadata = {
                      name: `Ice Punk #${tokenId}`,
                      description: "IcePunks NFT Collection generated from official traits.",
                      image: `${baseImageUrl}${tokenId}.png`,
                      edition: parseInt(tokenId, 10),
                      attributes: []
                  };

                  // Safe attribute mapping without any header dependency
                  for (let colIdx = 1; colIdx < headers.length; colIdx++) {
                      const headerName = headers[colIdx];
                      const val = columns[colIdx];

                      if (headerName.toLowerCase() !== 'attributes' && val && val.trim() !== '' && val.toLowerCase() !== 'nan') {
                          metadata.attributes.push({
                              trait_type: headerName,
                              value: val.replace(/^"|"$/g, '').trim()
                          });
                      }
                  }

                  const filePath = path.join(outputDir, tokenId);
                  fs.writeFileSync(filePath, JSON.stringify(metadata, null, 4), 'utf-8');
                  count++;
              } catch (err) {
                  // Silently skip any broken line to prevent crashing
                  continue;
              }
          }

          console.log(`Successfully generated ${count} metadata files!`);
          EOF
          node generate.js
          rm generate.js

      - name: Commit and Push Metadata Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Successfully generated 10k metadata files without header issues"
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes detected"
          fi
